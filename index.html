<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MY ENGLISH">
<script>
(function(){
  var c=document.createElement('canvas');
  c.width=180;c.height=180;
  var x=c.getContext('2d');
  x.fillStyle='#ffffff';
  x.fillRect(0,0,180,180);
  x.fillStyle='#000000';
  x.font='900 32px Helvetica,Arial,sans-serif';
  x.textAlign='center';
  x.fillText('MY',90,75);
  x.font='900 24px Helvetica,Arial,sans-serif';
  x.fillText('ENGLISH',90,112);
  var l=document.createElement('link');
  l.rel='apple-touch-icon';
  l.href=c.toDataURL('image/png');
  document.head.appendChild(l);
})();
</script>
<title>MY ENGLISH</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0f0f0f;--card:#1a1a1a;--accent:#f5c400;--text:#f0f0f0;--muted:#666}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding-bottom:90px;overflow-x:hidden}
  header{position:sticky;top:0;z-index:100;background:rgba(15,15,15,0.97);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:16px 20px 12px;border-bottom:1px solid #1f1f1f}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:10px}
  .backup-btn{background:none;border:1px solid #333;border-radius:8px;color:#888;font-size:12px;padding:5px 10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
  .count{font-size:12px;color:var(--muted)}
  .search-wrap{position:relative;margin-bottom:10px}
  .search-wrap input{width:100%;background:#1f1f1f;border:1px solid #2a2a2a;border-radius:10px;padding:10px 16px 10px 38px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:16px;outline:none}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
  .tags-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .tags-scroll::-webkit-scrollbar{display:none}
  .tag-btn{flex-shrink:0;background:#252525;border:1px solid #2a2a2a;color:var(--muted);border-radius:20px;padding:5px 14px;font-size:12px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap}
  .tag-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700}
  .cards{padding:20px 16px;display:flex;flex-direction:column;gap:16px}
  .card{background:var(--card);border:1px solid #2a2a2a;border-radius:16px;padding:20px;cursor:pointer;transition:opacity 0.15s,transform 0.15s;position:relative;user-select:none}
  .card.dragging{opacity:0.3;transform:scale(0.97)}
  .card.drag-over-top{border-top:3px solid var(--accent)}
  .card.drag-over-bottom{border-bottom:3px solid var(--accent)}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
  .card-tags{display:flex;gap:6px;flex-wrap:wrap}
  .card-tag{background:#252525;border:1px solid #333;color:var(--muted);border-radius:6px;padding:2px 8px;font-size:11px}
  .card-delete{background:none;border:none;color:#444;cursor:pointer;font-size:16px;padding:2px}
  .drag-handle{color:#333;font-size:18px;padding:2px 6px 2px 0;cursor:grab;touch-action:none}
  .expr-chunked{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;line-height:1.2;margin-bottom:8px}
  .highlight{color:var(--accent)}
  .expr-pronounce{font-size:13px;color:var(--muted);margin-bottom:12px}
  .divider{height:1px;background:#252525;margin-bottom:12px}
  .expr-meaning{font-size:16px;font-weight:500}
  .expr-memo{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.6;padding-left:8px;border-left:2px solid #333}
  .fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;background:var(--accent);border:none;border-radius:50%;color:#000;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(245,196,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;line-height:2}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:300;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  .sheet{background:#1a1a1a;border-radius:24px 24px 0 0;padding:28px 20px 40px;width:100%;max-width:500px;max-height:85dvh;overflow-y:auto}
  .sheet h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);margin-bottom:20px}
  .field-label{display:block;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;margin-top:13px}
  .field-input{width:100%;background:#252525;border:1px solid #333;border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:16px;outline:none}
  textarea.field-input{resize:vertical;line-height:1.6}
  .btn-row{display:flex;gap:10px;margin-top:22px}
  .btn-cancel{flex:1;padding:13px;background:#252525;border:1px solid #333;border-radius:12px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:14px;cursor:pointer}
  .btn-save{flex:2;padding:13px;background:var(--accent);border:none;border-radius:12px;color:#000;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
  .confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:400;align-items:center;justify-content:center}
  .confirm-overlay.open{display:flex}
  .confirm-box{background:#1a1a1a;border-radius:20px;padding:28px 24px;max-width:320px;width:90%;text-align:center}
  .tab-row{display:flex;gap:8px;margin-bottom:20px}
  .tab-btn{flex:1;padding:10px;background:#252525;border:none;border-radius:10px;color:#666;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
  .tab-btn.active{background:var(--accent);color:#000;font-weight:700}
  .backup-textarea{width:100%;background:#111;border:1px solid #333;border-radius:10px;padding:10px 14px;color:#aaa;font-size:12px;outline:none;box-sizing:border-box;resize:none;line-height:1.5;font-family:monospace;height:200px}
  #ghost{position:fixed;left:16px;right:16px;pointer-events:none;z-index:999;display:none;background:#222;border:2px solid var(--accent);border-radius:16px;padding:20px;opacity:0.95;box-shadow:0 12px 40px rgba(0,0,0,0.6)}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">MY ENGLISH</div>
    <div class="header-right">
      <div class="count" id="countEl">0 expressions</div>
    </div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="표현, 발음, 뜻 검색..." oninput="renderAll()">
  </div>
  <div class="tags-scroll" id="tagList"></div>
</header>

<div class="cards" id="cardList"></div>
<div id="ghost"></div>
<button class="fab" onclick="openAdd()">+</button>

<!-- 카드 추가/수정 -->
<div class="overlay" id="cardOverlay">
  <div class="sheet">
    <h2 id="sheetTitle">NEW EXPRESSION</h2>
    <label class="field-label">표현</label>
    <input class="field-input" id="f_chunked" placeholder="I'm gonna / THROW a / PARTY">
    <label class="field-label">발음</label>
    <input class="field-input" id="f_pronounce" placeholder="암 거너 / 쓰로어 / 파리">
    <label class="field-label">뜻</label>
    <input class="field-input" id="f_meaning" placeholder="나 파티 열 거야">
    <label class="field-label">메모</label>
    <textarea class="field-input" id="f_memo" rows="3" placeholder="추가 설명, 예문 등..."></textarea>
    <label class="field-label">태그 (쉼표로 구분)</label>
    <input class="field-input" id="f_tags" placeholder="일상, 파티">
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeCard()">취소</button>
      <button class="btn-save" id="saveBtn" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

<!-- 백업 -->
<div class="overlay" id="backupOverlay">
  <div class="sheet">
    <h2>백업 / 복원</h2>
    <div class="tab-row">
      <button class="tab-btn active" id="tab_export" onclick="switchTab('export')">📤 내보내기</button>
      <button class="tab-btn" id="tab_import" onclick="switchTab('import')">📥 가져오기</button>
    </div>
    <div id="export_panel">
      <div style="font-size:13px;color:#888;margin-bottom:10px;line-height:1.6">아래 텍스트를 전체 복사해서 메모앱에 저장해두세요.</div>
      <textarea class="backup-textarea" id="exportText" readonly></textarea>
      <button class="btn-save" style="width:100%;margin-top:12px" onclick="copyBackup()">📋 클립보드에 복사</button>
    </div>
    <div id="import_panel" style="display:none">
      <div style="font-size:13px;color:#888;margin-bottom:10px;line-height:1.6">저장해둔 백업 텍스트를 붙여넣고 복원하세요.<br><span style="color:#ff8888">⚠️ 현재 카드가 모두 교체됩니다.</span></div>
      <textarea class="backup-textarea" id="importText" placeholder="백업 텍스트를 여기에 붙여넣으세요..."></textarea>
      <div id="importMsg" style="font-size:13px;margin-top:6px;height:18px"></div>
      <button class="btn-save" style="width:100%;margin-top:10px" onclick="doImport()">복원하기</button>
    </div>
    <button class="btn-cancel" style="width:100%;margin-top:10px" onclick="closeBackup()">닫기</button>
  </div>
</div>

<!-- 삭제 확인 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div style="font-size:32px;margin-bottom:12px">🗑️</div>
    <div style="font-size:16px;font-weight:500;margin-bottom:6px">삭제할까요?</div>
    <div style="font-size:13px;color:#666;margin-bottom:22px">삭제하면 복구할 수 없어요</div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeConfirm()">취소</button>
      <button class="btn-save" style="background:#ff4444;color:#fff" onclick="doDelete()">삭제</button>
    </div>
  </div>
</div>

<script>
var KEY = 'myenglish_v1';
var cards = [], activeTag = '전체', editId = null, deleteId = null;

function load() {
  try { var v = localStorage.getItem(KEY); if (v) cards = JSON.parse(v); } catch {}
  if (!cards.length) cards = [{ id: 1, chunked: "I'm gonna / THROW a / PARTY", pronounce: "암 거너 / 쓰로어 / 파리", meaning: "나 파티 열 거야", memo: "", tags: ["일상"] }];
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(cards)); } catch {} }

function caps(t) {
  if (!t) return '';
  return t.replace(/[A-Z]{2,}/g, function(m) { return '<span class="highlight">' + m + '</span>'; });
}

function cardInnerHTML(c) {
  return '<div class="expr-chunked">' + caps(c.chunked) + '</div>' +
    (c.pronounce ? '<div class="expr-pronounce">(' + c.pronounce + ')</div>' : '') +
    '<div class="divider"></div>' +
    '<div class="expr-meaning">👉 ' + c.meaning + '</div>' +
    (c.memo ? '<div class="expr-memo">' + c.memo + '</div>' : '');
}

function renderAll() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var filtered = cards.filter(function(c) {
    var okTag = activeTag === '전체' || c.tags.indexOf(activeTag) !== -1;
    var okQ = !q || (c.chunked||'').toLowerCase().includes(q) || (c.pronounce||'').toLowerCase().includes(q) || (c.meaning||'').toLowerCase().includes(q);
    return okTag && okQ;
  });
  document.getElementById('countEl').textContent = filtered.length + ' expressions';

  var allTags = [];
  cards.forEach(function(c) { c.tags.forEach(function(t) { if (allTags.indexOf(t) === -1) allTags.push(t); }); });
  document.getElementById('tagList').innerHTML = ['전체'].concat(allTags).map(function(t) {
    return '<button class="tag-btn' + (activeTag === t ? ' active' : '') + '" onclick="setTag(\'' + t + '\')">' + t + '</button>';
  }).join('');

  if (!filtered.length) {
    document.getElementById('cardList').innerHTML = '<div class="empty"><div style="font-size:40px;margin-bottom:10px">🔍</div>표현이 없어요<br>+ 버튼으로 추가해보세요</div>';
    return;
  }

  document.getElementById('cardList').innerHTML = filtered.map(function(c) {
    var tagsHtml = c.tags.map(function(t) { return '<span class="card-tag">' + t + '</span>'; }).join('');
    return '<div class="card" data-id="' + c.id + '">' +
      '<div class="card-top">' +
      '<div style="display:flex;align-items:center;gap:4px">' +
      '<span class="drag-handle" data-drag="' + c.id + '">⠿</span>' +
      '<div class="card-tags">' + tagsHtml + '</div></div>' +
      '<button class="card-delete" onclick="event.stopPropagation();confirmDelete(' + c.id + ')">✕</button></div>' +
      cardInnerHTML(c) + '</div>';
  }).join('');

  // 카드 클릭 (드래그 핸들 제외)
  document.querySelectorAll('.card').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.classList.contains('drag-handle') || e.target.classList.contains('card-delete')) return;
      openEdit(parseInt(el.dataset.id));
    });
  });

  initDrag();
}

function setTag(t) { activeTag = t; renderAll(); }

// ── 드래그 ──
var dragId = null, dragging = false, lpTimer = null, touchStartY = 0;

function initDrag() {
  document.querySelectorAll('.card').forEach(function(card) {
    card.addEventListener('touchstart', function(e) {
      var id = parseInt(card.dataset.id);
      touchStartY = e.touches[0].clientY;
      lpTimer = setTimeout(function() {
        startDrag(id, e.touches[0].clientY);
      }, 400);
    }, { passive: true });

    card.addEventListener('touchmove', function(e) {
      if (!dragging) {
        var dy = Math.abs(e.touches[0].clientY - touchStartY);
        if (dy > 8) clearTimeout(lpTimer);
        return;
      }
      e.preventDefault();
      moveDrag(e.touches[0].clientY);
    }, { passive: false });

    card.addEventListener('touchend', function() {
      clearTimeout(lpTimer);
      if (dragging) endDrag();
    });
  });
}

function startDrag(id, y) {
  dragging = true;
  dragId = id;
  if (navigator.vibrate) navigator.vibrate(40);
  var card = document.querySelector('.card[data-id="' + id + '"]');
  if (card) card.classList.add('dragging');
  var ghost = document.getElementById('ghost');
  var c = cards.find(function(x) { return x.id === id; });
  if (c) ghost.innerHTML = cardInnerHTML(c);
  ghost.style.display = 'block';
  ghost.style.top = (y - 60) + 'px';
}

function moveDrag(y) {
  var ghost = document.getElementById('ghost');
  ghost.style.top = (y - 60) + 'px';
  document.querySelectorAll('.card').forEach(function(el) {
    el.classList.remove('drag-over-top', 'drag-over-bottom');
    if (parseInt(el.dataset.id) === dragId) return;
    var r = el.getBoundingClientRect();
    if (y >= r.top && y <= r.bottom) {
      el.classList.add(y < r.top + r.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
    }
  });
}

function endDrag() {
  dragging = false;
  document.getElementById('ghost').style.display = 'none';
  var targetId = null, before = true;
  document.querySelectorAll('.card').forEach(function(el) {
    el.classList.remove('dragging');
    if (el.classList.contains('drag-over-top')) { targetId = parseInt(el.dataset.id); before = true; }
    if (el.classList.contains('drag-over-bottom')) { targetId = parseInt(el.dataset.id); before = false; }
    el.classList.remove('drag-over-top', 'drag-over-bottom');
  });
  if (targetId && targetId !== dragId) {
    var si = cards.findIndex(function(c) { return c.id === dragId; });
    var moved = cards.splice(si, 1)[0];
    var ti = cards.findIndex(function(c) { return c.id === targetId; });
    cards.splice(before ? ti : ti + 1, 0, moved);
    save();
  }
  dragId = null;
  renderAll();
}

// ── 모달 ──
function openAdd() {
  editId = null;
  document.getElementById('sheetTitle').textContent = 'NEW EXPRESSION';
  document.getElementById('saveBtn').textContent = '저장';
  ['f_chunked','f_pronounce','f_meaning','f_memo','f_tags'].forEach(function(id) { document.getElementById(id).value = ''; });
  document.getElementById('cardOverlay').classList.add('open');
}
function openEdit(id) {
  var c = cards.find(function(x) { return x.id === id; });
  if (!c) return;
  editId = id;
  document.getElementById('sheetTitle').textContent = 'EDIT EXPRESSION';
  document.getElementById('saveBtn').textContent = '수정 완료';
  document.getElementById('f_chunked').value = c.chunked || '';
  document.getElementById('f_pronounce').value = c.pronounce || '';
  document.getElementById('f_meaning').value = c.meaning || '';
  document.getElementById('f_memo').value = c.memo || '';
  document.getElementById('f_tags').value = c.tags.join(', ');
  document.getElementById('cardOverlay').classList.add('open');
}
function closeCard() { document.getElementById('cardOverlay').classList.remove('open'); editId = null; }
function saveCard() {
  var chunked = document.getElementById('f_chunked').value.trim();
  var meaning = document.getElementById('f_meaning').value.trim();
  if (!chunked || !meaning) return;
  var data = {
    chunked: chunked,
    pronounce: document.getElementById('f_pronounce').value.trim(),
    meaning: meaning,
    memo: document.getElementById('f_memo').value.trim(),
    tags: document.getElementById('f_tags').value.split(',').map(function(t) { return t.trim(); }).filter(Boolean)
  };
  if (editId) {
    var idx = cards.findIndex(function(c) { return c.id === editId; });
    if (idx !== -1) cards[idx] = Object.assign({ id: editId }, data);
  } else {
    data.id = Date.now();
    cards.push(data); // 맨 아래에 추가
  }
  save(); renderAll(); closeCard();
}

function confirmDelete(id) { deleteId = id; document.getElementById('confirmOverlay').classList.add('open'); }
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('open'); deleteId = null; }
function doDelete() { cards = cards.filter(function(c) { return c.id !== deleteId; }); save(); renderAll(); closeConfirm(); }

function openBackup() {
  document.getElementById('exportText').value = JSON.stringify(cards, null, 2);
  document.getElementById('importText').value = '';
  document.getElementById('importMsg').textContent = '';
  switchTab('export');
  document.getElementById('backupOverlay').classList.add('open');
}
function closeBackup() { document.getElementById('backupOverlay').classList.remove('open'); }
function switchTab(t) {
  document.getElementById('tab_export').className = 'tab-btn' + (t === 'export' ? ' active' : '');
  document.getElementById('tab_import').className = 'tab-btn' + (t === 'import' ? ' active' : '');
  document.getElementById('export_panel').style.display = t === 'export' ? '' : 'none';
  document.getElementById('import_panel').style.display = t === 'import' ? '' : 'none';
}
function copyBackup() {
  var t = document.getElementById('exportText');
  t.select();
  try { document.execCommand('copy'); } catch {}
  navigator.clipboard && navigator.clipboard.writeText(t.value).catch(function(){});
}
function doImport() {
  try {
    var parsed = JSON.parse(document.getElementById('importText').value.trim());
    if (!Array.isArray(parsed)) throw new Error();
    cards = parsed; save(); renderAll();
    document.getElementById('importMsg').style.color = '#44cc88';
    document.getElementById('importMsg').textContent = '✓ 복원 완료!';
    setTimeout(closeBackup, 1000);
  } catch {
    document.getElementById('importMsg').style.color = '#ff4444';
    document.getElementById('importMsg').textContent = '올바른 백업 텍스트가 아니에요.';
  }
}

['cardOverlay','backupOverlay'].forEach(function(id) {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

load(); renderAll();
</script>
</body>
</html>
